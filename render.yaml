services:
  - type: web
    name: lifetrack
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: lifetrack-db
          property: connectionString

databases:
  - name: lifetrack-db
    databaseName: lifetrack
    user: lifetrack